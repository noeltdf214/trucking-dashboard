<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triple D Finest Logistics</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{margin:0;font-family:Arial;background:#050505;color:#fff;}
.hero{display:flex;justify-content:space-between;align-items:center;padding:60px;}
.form-box{background:#111;padding:25px;border-radius:15px;border:1px solid #f2c75b;width:350px;}
input,textarea{width:100%;padding:10px;margin-top:10px;}
button{margin-top:10px;padding:12px;width:100%;background:#f2c75b;border:none;font-weight:bold;}
#success{display:none;color:lightgreen;}
#error{display:none;color:red;}
</style>
</head>

<body>

<section class="hero">

<div>
<h1>Triple D Finest Logistics</h1>
<p>Texas & Surrounding States Freight Transportation</p>
</div>

<div class="form-box">
<h2>Request Quote</h2>

<form id="quoteForm">
<input type="hidden" name="access_key" value="9c4a5a14-3077-4d69-8c85-8e6d1f5323b7">

<input type="text" name="name" placeholder="Name" required>
<input type="email" name="email" placeholder="Email" required>
<input type="text" name="pickup_location" placeholder="Pickup" required>
<input type="text" name="delivery_location" placeholder="Delivery" required>
<textarea name="shipment_details" placeholder="Details"></textarea>

<button id="btn">Send</button>

<div id="success">Quote sent ✔</div>
<div id="error">Error sending</div>

</form>
</div>

</section>

<script>
const supabase = window.supabase.createClient(
"https://wptpyizbvwejhufqplci.supabase.co",
"sb_publishable_xbJiANs6mkDEPSho5G7t4A_e6u_nBAk"
);

const form = document.getElementById("quoteForm");
const btn = document.getElementById("btn");
const success = document.getElementById("success");
const error = document.getElementById("error");

form.addEventListener("submit", async (e)=>{
e.preventDefault();
btn.innerText="Sending...";
btn.disabled=true;

const data = new FormData(form);

try{

await supabase.from("quote_requests").insert([{
name:data.get("name"),
email:data.get("email"),
pickup_location:data.get("pickup_location"),
delivery_location:data.get("delivery_location"),
shipment_details:data.get("shipment_details")
}]);

await fetch("https://api.web3forms.com/submit",{
method:"POST",
body:data
});

success.style.display="block";
form.reset();

}catch{
error.style.display="block";
}

btn.innerText="Send";
btn.disabled=false;

});
</script>

</body>
</html>
