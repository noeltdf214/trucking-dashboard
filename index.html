<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triple D Finest Logistics LLC</title>
<style>
body {margin:0;font-family:Arial;background:#050505;color:#fff;}
nav {display:flex;justify-content:space-between;align-items:center;padding:15px 30px;background:#000;border-bottom:1px solid #222;}
nav img {height:60px;}
nav a {color:#fff;margin-left:20px;text-decoration:none;font-weight:bold;}
.hero {display:flex;justify-content:space-between;align-items:center;padding:80px 40px;background:linear-gradient(135deg,#000,#111);}
.hero-text {max-width:600px;}
.hero-text h1 {font-size:48px;}
.gold {color:#f2c75b;}
.form-box {background:#111;padding:25px;border-radius:20px;border:1px solid #f2c75b;width:350px;}
input, textarea {width:100%;padding:12px;margin-top:10px;border-radius:8px;border:none;}
button {width:100%;padding:14px;margin-top:15px;border:none;border-radius:10px;background:#f2c75b;font-weight:bold;cursor:pointer;}
#success {display:none;color:#7CFC98;margin-top:10px;}
#error {display:none;color:#ff6b6b;margin-top:10px;}
</style>
</head>
<body>

<nav>
  <img src="logo.png">
  <div>
    <a href="#quote">Quote</a>
    <a href="mailto:dispatch@tripledfinestlogistics.com">Contact</a>
  </div>
</nav>

<section class="hero">

<div class="hero-text">
<h1>Freight Solutions <span class="gold">You Can Trust</span></h1>
<p>Dallas-Based Freight Transportation Serving Texas & Surrounding States</p>
</div>

<div class="form-box" id="quote">
<h2>Request a Quote</h2>

<form id="form">
<input type="hidden" name="access_key" value="9c4a5a14-3077-4d69-8c85-8e6d1f5323b7">
<input type="hidden" name="subject" value="New Quote Request">
<input type="hidden" name="from_name" value="Triple D Finest Logistics">
<input type="hidden" name="replyto" value="email">
<input type="checkbox" name="botcheck" style="display:none;">

<input type="text" name="name" placeholder="Name" required>
<input type="email" name="email" placeholder="Email" required>
<input type="text" name="pickup" placeholder="Pickup Location" required>
<input type="text" name="delivery" placeholder="Delivery Location" required>

<textarea name="details" placeholder="Load details"></textarea>

<button type="submit" id="btn">Send Quote</button>

<div id="success">✅ Quote sent. We’ll contact you.</div>
<div id="error">❌ Error. Email dispatch directly.</div>

</form>
</div>

</section>

<script>
const form = document.getElementById("form");
const btn = document.getElementById("btn");
const success = document.getElementById("success");
const error = document.getElementById("error");

form.addEventListener("submit", async function(e){
  e.preventDefault();
  btn.innerText = "Sending...";
  btn.disabled = true;
  const data = new FormData(form);
  try {
    const res = await fetch("https://api.web3forms.com/submit", {
      method:"POST",
      body:data
    });
    const result = await res.json();
    if(result.success){
      success.style.display="block";
      form.reset();
    } else {
      error.style.display="block";
    }
  } catch {
    error.style.display="block";
  }
  btn.innerText="Send Quote";
  btn.disabled=false;
});
</script>

</body>
</html>
